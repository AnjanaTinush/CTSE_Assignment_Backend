apiVersion: v1
kind: Secret
metadata:
  name: ctse-secrets
  namespace: ctse-app
  labels:
    app: ctse
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_STRONG_RANDOM_SECRET_MIN_32_CHARS"
  AUTH_MONGO_URI: "mongodb+srv://user:pass@cluster.mongodb.net/auth?retryWrites=true&w=majority"
  PRODUCT_MONGO_URI: "mongodb+srv://user:pass@cluster.mongodb.net/products?retryWrites=true&w=majority"
  ORDER_MONGO_URI: "mongodb+srv://user:pass@cluster.mongodb.net/orders?retryWrites=true&w=majority"
  DELIVERY_MONGO_URI: "mongodb+srv://user:pass@cluster.mongodb.net/delivery?retryWrites=true&w=majority"
