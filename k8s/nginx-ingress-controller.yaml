# Add nginx ingress controller Helm repository
# Run: helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
# Run: helm install nginx-ingress ingress-nginx/ingress-nginx --namespace ingress-nginx --create-namespace

apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
---
# This will be installed via Helm chart, but here's the reference configuration
# After installing nginx ingress, update the service to use LoadBalancer:
# kubectl patch svc -n ingress-nginx nginx-ingress-ingress-nginx-controller -p '{"spec": {"type": "LoadBalancer"}}'
