apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ctse-app
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: product-service
          image: praveen1214/product-service:8c1e16c
          imagePullPolicy: Always
          ports:
            - containerPort: 3302
          env:
            - name: PORT
              value: "3302"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ctse-config
                  key: AUTH_SERVICE_URL
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: ctse-config
                  key: CORS_ORIGIN
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: ctse-config
                  key: NODE_ENV
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: ctse-secrets
                  key: PRODUCT_MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ctse-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3302
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3302
            initialDelaySeconds: 5
            periodSeconds: 10
