apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ctse-app
  labels:
    app: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      # Run as non-root (matches Dockerfile USER node)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: auth-service
          # Replace praveen1214 with your Docker Hub username
          image: praveen1214/auth-service:8c1e16c
          imagePullPolicy: Always
          ports:
            - containerPort: 3301
          env:
            - name: PORT
              value: "3301"
            - name: ORDER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: ctse-config
                  key: ORDER_SERVICE_URL
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: ctse-config
                  key: CORS_ORIGIN
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: ctse-config
                  key: NODE_ENV
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: ctse-secrets
                  key: AUTH_MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ctse-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3301
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3301
            initialDelaySeconds: 5
            periodSeconds: 10
