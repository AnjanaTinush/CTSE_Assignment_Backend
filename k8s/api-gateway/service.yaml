apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ctse-app
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  # Changed to ClusterIP since Ingress will handle external traffic with HTTPS/TLS
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3300
