version: "3.8"

services:
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "3300:3300"
    environment:
      - PORT=3300
      - AUTH_SERVICE_URL=http://auth-service:3301
      - PRODUCT_SERVICE_URL=http://product-service:3302
      - ORDER_SERVICE_URL=http://order-service:3303
      - DELIVERY_SERVICE_URL=http://delivery-service:3304
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    networks:
      - ctse-network
    depends_on:
      - auth-service
      - product-service
      - order-service
      - delivery-service

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "3301:3301"
    environment:
      - PORT=3301
      - MONGO_URI=${AUTH_MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - ORDER_SERVICE_URL=http://order-service:3303
    networks:
      - ctse-network

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    ports:
      - "3302:3302"
    environment:
      - PORT=3302
      - MONGO_URI=${PRODUCT_MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:3301
    networks:
      - ctse-network

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "3303:3303"
    environment:
      - PORT=3303
      - MONGO_URI=${ORDER_MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PRODUCT_SERVICE_URL=http://product-service:3302
    networks:
      - ctse-network

  delivery-service:
    build:
      context: ./delivery-service
      dockerfile: Dockerfile
    ports:
      - "3304:3304"
    environment:
      - PORT=3304
      - MONGO_URI=${DELIVERY_MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - ORDER_SERVICE_URL=http://order-service:3303
    networks:
      - ctse-network

networks:
  ctse-network:
    driver: bridge
