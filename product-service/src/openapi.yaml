openapi: 3.0.3
info:
  title: Product Service API
  version: 1.0.0
servers:
  - url: http://localhost:3002
paths:
  /health:
    get:
      summary: Service health check
      responses:
        '200':
          description: OK
  /products:
    get:
      summary: List products
      responses:
        '200':
          description: Product list
    post:
      summary: Create product (ADMIN)
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Created
  /products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Product
  /products/{id}/reserve:
    patch:
      summary: Reserve quantity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Reservation success
  /products/{id}/release:
    patch:
      summary: Release quantity
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Release success
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
