# ──────────────────────────────────────────────────────────────────────────────
# SonarCloud configuration
# Steps to activate:
#   1. Sign up at https://sonarcloud.io (free with GitHub login)
#   2. Import your GitHub repository into a SonarCloud organization
#   3. Note your Organization Key and Project Key from SonarCloud
#   4. Replace the placeholder values below
#   5. Add SONAR_TOKEN repository secret in GitHub Settings → Secrets
# ──────────────────────────────────────────────────────────────────────────────
sonar.projectKey=AnjanaTinush_CTSE_Assignment_Backend
sonar.organization=anjanatinush

# Human-readable project name and version
sonar.projectName=CTSE Microservices Backend
sonar.projectVersion=1.0

# Source directories (covers all microservices)
sonar.sources=auth-service/src,product-service/src,order-service/src,delivery-service/src,api-gateway

# Exclusions: node_modules, test files, generated files
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js,**/openapi.yaml

# Test files pattern (for future test coverage reporting)
sonar.test.inclusions=**/test/**/*.test.js

# Language settings
sonar.language=js
sonar.javascript.lcov.reportPaths=**/coverage/lcov.info

# Pull-request decoration (for inline annotations on PRs)
sonar.pullrequest.provider=github
sonar.pullrequest.github.repository=AnjanaTinush/CTSE_Assignment_Backend
