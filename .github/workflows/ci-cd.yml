name: CI/CD Pipeline

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  NODE_VERSION: "20.x"

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Stage 1 – Unit Tests (all branches / PRs)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests – ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            auth-service,
            product-service,
            order-service,
            delivery-service,
            api-gateway,
          ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: npm test

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 2 – Snyk SCA / dependency vulnerability scan  (DevSecOps)
  # Skipped gracefully when SNYK_TOKEN secret is absent.
  # ────────────────────────────────────────────────────────────────────────────
  snyk-scan:
    name: Snyk Security – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            auth-service,
            product-service,
            order-service,
            delivery-service,
            api-gateway,
          ]
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run Snyk vulnerability scan
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --file=${{ matrix.service }}/package.json

      - name: Notice – Snyk not configured
        if: env.SNYK_TOKEN == ''
        run: echo "::warning::SNYK_TOKEN secret not set. Add it in Settings → Secrets to enable dependency scanning."

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 3 – SonarCloud SAST analysis  (DevSecOps)
  # Skipped gracefully when SONAR_TOKEN secret is absent.
  # ────────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    needs: test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout code (full history for SonarCloud)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Notice – SonarCloud not configured
        if: env.SONAR_TOKEN == ''
        run: echo "::warning::SONAR_TOKEN secret not set. Add it in Settings → Secrets to enable SAST scanning."

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 4 – Build & push Docker images to Docker Hub  (main branch only)
  # ────────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [snyk-scan, sonarcloud]
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            auth-service,
            product-service,
            order-service,
            delivery-service,
            api-gateway,
          ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:sha-${{ github.sha }}
          # Layer caching speeds up subsequent builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 5a – Deploy to AWS ECS  (main branch, only when DEPLOY_TARGET=ecs)
  # Set the repository variable DEPLOY_TARGET=ecs and the AWS secrets to enable.
  # ────────────────────────────────────────────────────────────────────────────
  deploy-ecs:
    name: Deploy to ECS – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_TARGET == 'ecs'
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            auth-service,
            product-service,
            order-service,
            delivery-service,
            api-gateway,
          ]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Force new ECS rolling deployment
        run: |
          aws ecs update-service \
            --cluster "${{ vars.AWS_ECS_CLUSTER }}" \
            --service "${{ matrix.service }}" \
            --force-new-deployment

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 5b – Deploy to Kubernetes  (main branch, only when DEPLOY_TARGET=k8s)
  # Set the repository variable DEPLOY_TARGET=k8s and the KUBECONFIG_DATA secret.
  # KUBECONFIG_DATA = base-64 encoded kubeconfig file for your cluster.
  # Required runtime secrets for upgraded backend:
  # JWT_SECRET, INTERNAL_SERVICE_TOKEN,
  # AUTH_MONGO_URI, PRODUCT_MONGO_URI, ORDER_MONGO_URI, DELIVERY_MONGO_URI
  # ────────────────────────────────────────────────────────────────────────────
  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_TARGET == 'k8s'
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
      AUTH_MONGO_URI: ${{ secrets.AUTH_MONGO_URI }}
      PRODUCT_MONGO_URI: ${{ secrets.PRODUCT_MONGO_URI }}
      ORDER_MONGO_URI: ${{ secrets.ORDER_MONGO_URI }}
      DELIVERY_MONGO_URI: ${{ secrets.DELIVERY_MONGO_URI }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubectl from secret
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Validate required Kubernetes runtime secrets
        run: |
          missing=()
          required=(
            JWT_SECRET
            INTERNAL_SERVICE_TOKEN
            AUTH_MONGO_URI
            PRODUCT_MONGO_URI
            ORDER_MONGO_URI
            DELIVERY_MONGO_URI
          )

          for key in "${required[@]}"; do
            if [[ -z "${!key}" ]]; then
              missing+=("$key")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required GitHub secrets for Kubernetes deploy: ${missing[*]}"
            exit 1
          fi

      - name: Update image tags in deployment manifests
        run: |
          for svc in auth-service product-service order-service delivery-service api-gateway; do
            sed -i -E "s|image: .*/${svc}:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/${svc}:sha-${{ github.sha }}|g" \
              k8s/${svc}/deployment.yaml
          done

      - name: Apply namespace, config, and secrets
        run: |
          kubectl apply -f k8s/namespace.yaml

          kubectl -n ctse-app create secret generic ctse-secrets \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=INTERNAL_SERVICE_TOKEN="$INTERNAL_SERVICE_TOKEN" \
            --from-literal=AUTH_MONGO_URI="$AUTH_MONGO_URI" \
            --from-literal=PRODUCT_MONGO_URI="$PRODUCT_MONGO_URI" \
            --from-literal=ORDER_MONGO_URI="$ORDER_MONGO_URI" \
            --from-literal=DELIVERY_MONGO_URI="$DELIVERY_MONGO_URI" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/configmap.yaml

      - name: Apply service deployments
        run: |
          for svc in auth-service product-service order-service delivery-service api-gateway; do
            kubectl apply -f k8s/${svc}/
          done

      - name: Wait for rollouts to complete
        run: |
          for svc in auth-service product-service order-service delivery-service api-gateway; do
            kubectl rollout status deployment/${svc} --namespace=ctse-app --timeout=180s
          done
