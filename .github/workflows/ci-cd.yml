name: CI/CD Pipeline

# ──────────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  NODE_VERSION: "20.x"
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Stage 1 – Unit Tests (all branches / PRs)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests – ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            auth-service,
            product-service,
            order-service,
            delivery-service,
            api-gateway,
          ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run unit tests
        working-directory: ${{ matrix.service }}
        run: npm test

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 2 – Snyk SCA / dependency vulnerability scan  (DevSecOps)
  # Skipped gracefully when SNYK_TOKEN secret is absent.
  # ────────────────────────────────────────────────────────────────────────────
  snyk-scan:
    name: Snyk Security – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            auth-service,
            product-service,
            order-service,
            delivery-service,
            api-gateway,
          ]
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm ci

      - name: Run Snyk vulnerability scan
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ env.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --file=${{ matrix.service }}/package.json

      - name: Notice – Snyk not configured
        if: env.SNYK_TOKEN == ''
        run: echo "::warning::SNYK_TOKEN secret not set. Add it in Settings → Secrets to enable dependency scanning."

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 3 – SonarCloud SAST analysis  (DevSecOps)
  # Skipped gracefully when SONAR_TOKEN secret is absent.
  # ────────────────────────────────────────────────────────────────────────────
  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    needs: test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout code (full history for SonarCloud)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: Notice – SonarCloud not configured
        if: env.SONAR_TOKEN == ''
        run: echo "::warning::SONAR_TOKEN secret not set. Add it in Settings → Secrets to enable SAST scanning."

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 4 – Build & push Docker images to Docker Hub  (main branch only)
  # ────────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push – ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [snyk-scan, sonarcloud]
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        service:
          [
            auth-service,
            product-service,
            order-service,
            delivery-service,
            api-gateway,
          ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:sha-${{ github.sha }}
          # Layer caching speeds up subsequent builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 5 – Terraform: Provision / Update AKS infrastructure
  # Runs on main branch after Docker images are pushed.
  # Requires Azure Service Principal secrets:
  #   ARM_CLIENT_ID, ARM_CLIENT_SECRET, ARM_TENANT_ID, ARM_SUBSCRIPTION_ID
  # And Terraform variable secrets:
  #   TF_VAR_jwt_secret, TF_VAR_internal_service_token,
  #   TF_VAR_auth_mongo_uri, TF_VAR_product_mongo_uri,
  #   TF_VAR_order_mongo_uri, TF_VAR_delivery_mongo_uri
  # ────────────────────────────────────────────────────────────────────────────
  terraform:
    name: Terraform – Provision AKS & Deploy
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan -input=false \
            -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var="resource_group_name=ctse-group" \
            -var="aks_cluster_name=ctse-cluster" \
            -var="location=southeastasia" \
            -var="dns_prefix=ctse" \
            -var="node_count=2" \
            -var="vm_size=Standard_B2s" \
            -var="dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}" \
            -var="image_tag=sha-${{ github.sha }}" \
            -var="cors_origin=*" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="internal_service_token=${{ secrets.INTERNAL_SERVICE_TOKEN }}" \
            -var="auth_mongo_uri=${{ secrets.AUTH_MONGO_URI }}" \
            -var="product_mongo_uri=${{ secrets.PRODUCT_MONGO_URI }}" \
            -var="order_mongo_uri=${{ secrets.ORDER_MONGO_URI }}" \
            -var="delivery_mongo_uri=${{ secrets.DELIVERY_MONGO_URI }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  # ────────────────────────────────────────────────────────────────────────────
  # Stage 6 – Deploy K8s manifests to AKS  (main branch)
  # Applies ingress, cert-manager, and service manifests via kubectl.
  # This runs AFTER Terraform provisions the cluster.
  # Required secrets:
  #   KUBECONFIG_DATA (base64-encoded kubeconfig)
  #   JWT_SECRET, INTERNAL_SERVICE_TOKEN,
  #   AUTH_MONGO_URI, PRODUCT_MONGO_URI, ORDER_MONGO_URI, DELIVERY_MONGO_URI
  # ────────────────────────────────────────────────────────────────────────────
  deploy-k8s:
    name: Deploy to AKS Kubernetes
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'
    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
      AUTH_MONGO_URI: ${{ secrets.AUTH_MONGO_URI }}
      PRODUCT_MONGO_URI: ${{ secrets.PRODUCT_MONGO_URI }}
      ORDER_MONGO_URI: ${{ secrets.ORDER_MONGO_URI }}
      DELIVERY_MONGO_URI: ${{ secrets.DELIVERY_MONGO_URI }}
      LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
      API_HOST: ${{ vars.K8S_API_HOST || '20-44-216-47.sslip.io' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ctse-group \
            --name ctse-cluster \
            --overwrite-existing

      - name: Update image tags in deployment manifests
        run: |
          for svc in auth-service product-service order-service delivery-service api-gateway; do
            sed -i -E "s|image: .*/${svc}:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/${svc}:sha-${{ github.sha }}|g" \
              k8s/${svc}/deployment.yaml
          done

      - name: Install/upgrade ingress-nginx controller
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install nginx-ingress ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --set controller.service.type=LoadBalancer

      - name: Install/upgrade cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true

      - name: Render HTTPS manifests
        run: |
          sed "s|__LETSENCRYPT_EMAIL__|${LETSENCRYPT_EMAIL}|g" k8s/cert-manager-setup.yaml > /tmp/cert-manager-setup.yaml
          sed "s|__API_HOST__|${API_HOST}|g" k8s/ingress.yaml > /tmp/ingress.yaml

      - name: Apply namespace, config, and secrets
        run: |
          kubectl apply -f k8s/namespace.yaml

          kubectl -n ctse-app create secret generic ctse-secrets \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=INTERNAL_SERVICE_TOKEN="$INTERNAL_SERVICE_TOKEN" \
            --from-literal=AUTH_MONGO_URI="$AUTH_MONGO_URI" \
            --from-literal=PRODUCT_MONGO_URI="$PRODUCT_MONGO_URI" \
            --from-literal=ORDER_MONGO_URI="$ORDER_MONGO_URI" \
            --from-literal=DELIVERY_MONGO_URI="$DELIVERY_MONGO_URI" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f /tmp/cert-manager-setup.yaml
          kubectl apply -f /tmp/ingress.yaml

      - name: Apply service deployments
        run: |
          for svc in auth-service product-service order-service delivery-service api-gateway; do
            kubectl apply -f k8s/${svc}/
          done

      - name: Wait for rollouts to complete
        run: |
          for svc in auth-service product-service order-service delivery-service api-gateway; do
            kubectl rollout status deployment/${svc} --namespace=ctse-app --timeout=180s
          done
